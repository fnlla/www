name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: repository
    attributes:
      label: Repository
      description: Which fnlla repository is affected?
      placeholder: fnlla/fnlla
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Affected version, tag, or commit
      placeholder: v3.0.6
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide exact steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: PHP, Composer, OS, server/runtime
    validations:
      required: true
